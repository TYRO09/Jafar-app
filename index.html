<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ESP32 Voice Control</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>Voice Control</h1>
        <div class="header-right">
          <div class="esp-status-indicator" id="esp-status-indicator">
            <span class="status-dot disconnected" id="esp-status-dot"></span>
            <span class="status-text" id="esp-status-text">ESP: Disconnected</span>
          </div>
          <button id="settings-btn" class="settings-btn" aria-label="Settings">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </button>
        </div>
      </header>
      
      <!-- Settings Modal -->
      <div id="settings-modal" class="modal hidden">
        <div class="modal-content glass">
          <h2>ESP32 Settings</h2>
          <div class="form-group">
            <label for="esp-ip-input">ESP IP Address</label>
            <input type="text" id="esp-ip-input" value="192.168.4.1">
          </div>
          <div class="form-group">
            <label for="esp-path-input">Command URL Path</label>
            <input type="text" id="esp-path-input" value="/cmd?servo=1&angle=">
            <small>Angle will be appended to the end.</small>
          </div>
          <div class="modal-actions">
            <button id="test-conn-btn" class="btn secondary-btn">Test Connection</button>
            <button id="save-settings-btn" class="btn primary-btn">Save</button>
          </div>
          <p id="settings-log" class="settings-log"></p>
        </div>
      </div>

      <main class="main-content">
        <div class="status-card glass">
          <h2>Current Mode</h2>
          <div id="mode-display" class="mode-value">Disconnected</div>
          <div class="angle-display">Angle: <span id="angle-value">--</span>°</div>
        </div>

        <div class="voice-control-section">
          <button id="mic-button" class="mic-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
          </button>
          <p id="mic-status" class="mic-status">Tap to speak</p>
          <div id="progress-container" class="progress-container hidden">
            <div class="progress-bar-bg">
              <div id="progress-bar-fill" class="progress-bar-fill"></div>
            </div>
            <p id="progress-text" class="progress-text">0%</p>
          </div>
        </div>

        <div class="log-card glass">
          <h3>Last Recognized Command</h3>
          <p id="log-output" class="log-output">...</p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
